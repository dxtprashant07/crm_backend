databases:
  - name: crm-db
    plan: free
    databaseName: crm_production
    region: singapore

services:
  - type: web
    name: crm-backend
    env: ruby
    region: singapore
    plan: free
    buildCommand: |
      bundle install
      bundle exec rails db:migrate
      bundle exec rails db:seed
    startCommand: bundle exec puma -C config/puma.rb
    healthCheckPath: /up
    envVars:
      - key: RAILS_ENV
        value: production
      - key: RAILS_SERVE_STATIC_FILES
        value: "true"
      - key: RAILS_LOG_TO_STDOUT
        value: "true"
      - key: SECRET_KEY_BASE
        generateValue: true
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: crm-db
          property: connectionString
      - key: FRONTEND_URL
        value: ""
